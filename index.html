<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EM Evidence Sim">
    <link rel="manifest" href="manifest.json">
    <title>EM Evidence Sim</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: {
                    colors: {
                        slate: { 950: '#020617' } 
                    }
                } 
            },
            plugins: [],
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Base Setup */
        html, body { height: 100%; overflow: hidden; background-color: #0f172a; color: #f1f5f9; }
        #root { height: 100%; width: 100%; display: flex; flex-direction: column; }
        
        /* Utilities */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animations */
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .flash-red { animation: flashRed 1s infinite; }
        @keyframes flashRed { 0%, 100% { box-shadow: inset 0 0 0 0 transparent; } 50% { box-shadow: inset 0 0 50px 20px rgba(239, 68, 68, 0.5); } }
        
        .flash-green { animation: flashGreen 1s ease-out; }
        @keyframes flashGreen { 0% { box-shadow: inset 0 0 50px 20px rgba(34, 197, 94, 0.5); } 100% { box-shadow: inset 0 0 0 0 transparent; } }
        
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        /* Accessibility: visible focus indicators (WCAG 2.4.7). */
        :focus { outline: none; }
        :focus-visible { outline: 2px solid #38bdf8; outline-offset: 2px; border-radius: 4px; }
        button:focus-visible, [role="button"]:focus-visible {
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.6);
            outline: none;
        }
        input:focus-visible, textarea:focus-visible, select:focus-visible {
            outline: 2px solid #38bdf8;
            outline-offset: 1px;
        }
    </style>
</head>
<body class="antialiased selection:bg-sky-500 selection:text-white">
    <div id="root">
        <div class="flex h-full items-center justify-center text-slate-500 flex-col gap-4">
            <svg class="animate-spin h-10 w-10 text-sky-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="font-mono text-sm tracking-widest uppercase">Initializing...</span>
        </div>
    </div>

    <script type="text/babel" src="data/interventions.js"></script>
    <script type="text/babel" src="data/generators.js"></script>
    <script type="text/babel" src="data/scenarios.js"></script>
    <script type="text/babel" src="data/components.js"></script>
    <script type="text/babel" src="data/engine.js"></script>

    <script type="text/babel" src="data/screens/setup.js"></script>
    <script type="text/babel" src="data/screens/monitor.js"></script>
    <script type="text/babel" src="data/screens/livesim.js"></script>
    <script type="text/babel" src="data/screens/debrief.js"></script>
    <script type="text/babel" src="data/screens/index.js"></script>

    <script type="text/babel">
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBz77EHl9QhFJ0k2ZFODydChuGeCAXq1II",
            authDomain: "wmebem-sim.firebaseapp.com",
            projectId: "wmebem-sim",
            storageBucket: "wmebem-sim.firebasestorage.app",
            messagingSenderId: "143041936940",
            appId: "1:143041936940:web:4d15c3fc3ce7e10c081b89",
            measurementId: "G-8C6WW1EWXJ"
        };

        // --- INIT FIREBASE ---
        try {
            if (window.firebase && !firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                window.db = firebase.database();
                console.log("Firebase Connected");
            }
        } catch (e) {
            console.error("Firebase Init Failed:", e);
        }

        // --- REGISTER SERVICE WORKER (offline resilience for tablets) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed', err));
            });
        }

        // --- APP COMPONENT ---
        const App = () => {
            const { useState, useEffect } = React;
            const { SetupScreen, JoinScreen, BriefingScreen, MonitorContainer, LiveSimContainer, useSimulation } = window;

            // URL Params for Monitor Mode
            const urlParams = new URLSearchParams(window.location.search);
            const initialMode = urlParams.get('mode') === 'monitor' ? 'monitor' : 'setup';
            const initialSession = urlParams.get('session');

            const [view, setView] = useState(initialMode); 
            const [sessionID, setSessionID] = useState(initialSession);
            const [generatedScenario, setGeneratedScenario] = useState(null);
            
            // Generate Session ID if Controller
            useEffect(() => {
                if (!sessionID && view !== 'monitor') {
                    const id = Math.random().toString(36).substring(2, 6).toUpperCase();
                    setSessionID(id);
                }
            }, []);

            // --- SIM ENGINE ---
            // Initializes the logic core. Pass sessionID to enable sync.
            const engine = useSimulation(
                generatedScenario, 
                view === 'monitor', 
                sessionID
            );

            // --- HANDLERS ---
            const handleGenerate = (scenario, modifiers) => {
                setGeneratedScenario(scenario);
                engine.dispatch({ type: 'LOAD_SCENARIO', payload: scenario });
                setView('briefing');
            };

            const handleStart = () => {
                engine.start();
                setView('livesim');
            };

            const handleJoin = (code) => {
                setSessionID(code);
                setView('monitor');
            };

            const handleResume = (saved) => {
                if(saved && saved.scenario) {
                    setGeneratedScenario(saved.scenario);
                    engine.dispatch({ type: 'RESTORE_SESSION', payload: saved });
                    setView('livesim');
                }
            };

            // --- RECOVERY CHECK ---
            const [resumeData, setResumeData] = useState(null);
            useEffect(() => {
                const saved = localStorage.getItem('wmebem_sim_state');
                if (saved && view === 'setup') {
                    try { setResumeData(JSON.parse(saved)); } catch(e){}
                }
            }, [view]);

            // --- RENDER ---
            
            // 1. Monitor View (Clean, Full Screen)
            if (view === 'monitor') {
                return <MonitorContainer sessionID={sessionID} />;
            }

            // 2. Controller Views (Header + Footer)
            return (
                <div className="h-full flex flex-col">
                    {/* Header */}
                    <header className="flex items-center justify-between p-3 border-b border-slate-800 bg-slate-900 flex-shrink-0">
                        <div className="flex items-center gap-3">
                            <a href="https://emevidence.org" target="_blank" rel="noopener noreferrer">
                                <img src="https://iili.io/KGQOvkl.md.png" alt="EM Evidence Logo" className="h-10 object-contain" />
                            </a>
                            <h1 className="text-xl font-bold text-sky-400 tracking-tight hidden md:block">EM Evidence Sim</h1>
                        </div>
                        {view !== 'setup' && sessionID && (
                            <div className="flex flex-col items-end">
                                <div className="text-[9px] text-slate-500 uppercase font-bold tracking-wider">Session ID</div>
                                <div className="font-mono text-lg font-bold text-white tracking-widest leading-none select-all cursor-pointer" onClick={()=>{navigator.clipboard.writeText(sessionID); alert('Copied!');}}>{sessionID}</div>
                            </div>
                        )}
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow overflow-hidden relative bg-slate-900">
                        {view === 'setup' && (
                            <SetupScreen 
                                onGenerate={handleGenerate} 
                                onJoinClick={() => setView('join')} 
                                sessionID={sessionID}
                                savedState={resumeData}
                                onResume={() => handleResume(resumeData)}
                            />
                        )}
                        {view === 'join' && <JoinScreen onJoin={handleJoin} />}
                        {view === 'briefing' && (
                            <BriefingScreen 
                                scenario={generatedScenario} 
                                onStart={handleStart} 
                                onBack={() => setView('setup')} 
                            />
                        )}
                        {(view === 'livesim' || view === 'debrief') && (
                            <LiveSimContainer 
                                sim={engine} 
                                view={view} 
                                setView={setView} 
                                onRestart={() => { engine.reset(); setView('setup'); }}
                                sessionID={sessionID}
                            />
                        )}
                    </main>

                    {/* Footer */}
                    <footer classname="bg-slate-950 border-t border-slate-800 p-1 text-center text-[10px] text-slate-600 flex-shrink-0">
                        <p>&copy; {new Date().getFullYear()} <a href="https://emevidence.org" target="_blank" rel="noopener noreferrer" className="text-sky-700 hover:text-sky-500">EM Evidence</a> &nbsp;&bull;&nbsp; <a href="https://emevidence.org" target="_blank" rel="noopener noreferrer" className="hover:text-slate-400">emevidence.org</a> &nbsp;&bull;&nbsp; <a href="mailto:emevidence999@gmail.com" className="hover:text-slate-400">emevidence999@gmail.com</a></p>
                    </footer>
                </div>
            );
        };

        // --- MOUNT ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
